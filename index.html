<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoryMap – Rutas Migratorias hacia España (Fullscreen)</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Styles for the scrollytelling layout (dark overlay) -->
  <link rel="stylesheet" href="scroll.css" />
</head>
<body>

  <!-- Fullscreen map -->
  <div id="map"></div>

  <!-- Overlay scrollytelling (dark) -->
  <aside id="overlay" class="overlay overlay-dark">
    <header class="brand">
      <h1>Rutas migratorias hacia España</h1>
      <p>Desplázate para avanzar por los capítulos. El mapa se actualizará automáticamente.</p>
    </header>
    <div id="steps" class="steps"></div>
    <footer class="footnote">Fuentes en cada capítulo cuando están disponibles.</footer>
  </aside>

  <!-- Polyfill (for older browsers) -->
  <script src="https://polyfill.io/v3/polyfill.min.js?features=IntersectionObserver"></script>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Scrollama (scrollytelling helper) -->
  <script src="https://unpkg.com/scrollama@3.2.0/build/scrollama.min.js"></script>

  <!-- Config (GeoJSON + chapters) -->
  <script src="config.js"></script>

  <!-- Story logic -->
  <script src="story.js"></script>
</body>
</html>
